selection_policy:
  purpose_ko: >-
    X 계정을 기사 근거 목록이 아니라 원 논문·코드·시스템 카드·릴리스 노트를
    발견하기 위한 사람 중심 신호망으로 운영한다.
  follower_count_used: false
  follower_count_rule_ko: >-
    팔로워 수, 인증 배지, 노출·좋아요·재게시 수는 선정·유지·근거 등급의 입력으로
    저장하거나 사용하지 않는다.
  required_expertise:
    - model-research
    - evaluation
    - safety
    - agents
    - reasoning-systems
    - open-source
    - data
    - training-infrastructure
    - serving-infrastructure
  balance_rules:
    - active seed의 어느 한 조직도 25%를 초과하지 않는다.
    - 산업 연구·엔지니어, 학계, 박사과정·초기 경력, 오픈 연구·독립 실무 역할을 모두 포함한다.
    - 전문 태그 하나의 유명 인물만이 아니라 상호 검증 가능한 서로 다른 역할을 포함한다.
    - 경영자·브랜드 대표라는 사실만으로 선정하지 않으며 공개 기술 산출물 경로를 요구한다.
  status_semantics:
    active: 신원과 handle이 확인되었으며 수집 대상으로 허용된다. 최근 게시를 뜻하지 않는다.
    quiet: 180일 이상 원문 기술 게시를 관찰하지 못했으나 기록은 보존한다.
    verification_due: last_verified_at이 90일을 넘겨 재검증 전 신규 수집을 보류한다.
    renamed: handle 변경이 확인되어 이전 URL과 새 URL을 함께 보존한다.
    departed: 소속 이탈은 확인했으나 새 역할을 아직 확인하지 못했다.
    deleted: 계정 삭제 또는 영구 접근 불가가 확인되었다.
    excluded: 명시적 사유로 수집 대상에서 제외되었으며 기록은 삭제하지 않는다.
  activity_semantics:
    recent: 최근 180일 이내 원문 기술 게시를 직접 확인했다.
    quiet: 최근 180일 이내 원문 기술 게시를 확인하지 못했다.
    unverified: X 접근 제한 등으로 게시 주기를 판정하지 않았다.

